<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5ive Blackjack Localnet</title>
  <style>
    :root {
      --felt-a: #0b5f3d;
      --felt-b: #063824;
      --line: #d7c89c;
      --ink: #f4f4f5;
      --muted: #d4d4d8;
      --card-bg: #fffefb;
      --card-ink: #18181b;
      --danger: #dc2626;
      --btn: #0f172a;
      --btn-b: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 10%, #1f2937 0%, #020617 65%);
      padding: 16px;
    }
    .table {
      max-width: 1100px;
      margin: 0 auto;
      border: 2px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      background:
        radial-gradient(1200px 700px at 50% -20%, rgba(255,255,255,.08), transparent 60%),
        linear-gradient(160deg, var(--felt-a), var(--felt-b));
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 12px;
    }
    .title { font-size: 28px; font-weight: 800; letter-spacing: .4px; }
    .subtitle { color: var(--muted); font-size: 13px; }
    .status {
      margin: 8px 0 14px;
      min-height: 22px;
      color: #bef264;
      font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
      font-size: 13px;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .hand {
      border: 1px solid rgba(215, 200, 156, .45);
      border-radius: 14px;
      padding: 12px;
      background: rgba(2, 6, 23, .25);
    }
    .hand-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 124px;
      align-items: center;
    }
    .card {
      width: 78px;
      height: 108px;
      border-radius: 10px;
      background: var(--card-bg);
      color: var(--card-ink);
      border: 1px solid #d4d4d8;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 8px;
      box-shadow: 0 8px 18px rgba(0,0,0,.24);
      font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    }
    .card.hidden {
      background: repeating-linear-gradient(45deg, #0f172a, #0f172a 8px, #1e293b 8px, #1e293b 16px);
      border-color: #64748b;
      color: transparent;
    }
    .card.red { color: var(--danger); }
    .top { font-weight: 700; }
    .mid { text-align: center; font-size: 19px; }
    .bot { text-align: right; font-weight: 700; }

    .actions {
      border: 1px solid rgba(215, 200, 156, .45);
      border-radius: 14px;
      padding: 12px;
      background: rgba(2, 6, 23, .25);
      display: grid;
      gap: 10px;
    }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .wallet-row { align-items: center; }
    .pill {
      border: 1px solid var(--btn-b);
      border-radius: 999px;
      font-size: 12px;
      padding: 6px 10px;
      color: var(--muted);
    }
    input, button {
      border-radius: 10px;
      border: 1px solid var(--btn-b);
      background: var(--btn);
      color: var(--ink);
      font-size: 14px;
      padding: 9px 10px;
    }
    input { width: 126px; }
    button { cursor: pointer; font-weight: 600; }
    button:hover { border-color: #94a3b8; }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      border-color: #334155;
    }
    .primary {
      background: linear-gradient(180deg, #0b3b69, #08243f);
      border-color: #2563eb;
    }
    .warn {
      background: linear-gradient(180deg, #5b1f1f, #3b1111);
      border-color: #dc2626;
    }
    .result-banner {
      border: 1px solid rgba(215, 200, 156, .45);
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      font-size: 14px;
      background: rgba(2, 6, 23, .35);
      color: var(--ink);
    }
    .result-win { color: #86efac; border-color: rgba(34, 197, 94, 0.45); }
    .result-lose { color: #fca5a5; border-color: rgba(239, 68, 68, 0.45); }
    .result-push { color: #fde68a; border-color: rgba(245, 158, 11, 0.45); }
    @media (max-width: 900px) {
      .title { font-size: 23px; }
    }
  </style>
</head>
<body>
  <main class="table">
    <div class="head">
      <div>
        <div class="title">Blackjack</div>
        <div class="subtitle">5ive localnet live table</div>
      </div>
      <div id="summary" class="subtitle">chips: 0 | bet: 0 | outcome: idle</div>
    </div>

    <div class="status" id="status">ready</div>

    <section class="layout">
      <section class="hand">
        <div class="hand-head"><span>Dealer</span><span id="dealerTotal">total: 0</span></div>
        <div class="cards" id="dealerCards"></div>
      </section>

      <section class="hand">
        <div class="hand-head"><span>Player</span><span id="playerTotal">total: 0</span></div>
        <div class="cards" id="playerCards"></div>
      </section>

      <section class="actions">
        <div class="row wallet-row">
          <span id="walletStatus" class="pill">not connected</span>
          <button id="walletConnect">Connect Wallet</button>
          <button id="walletDisconnect" style="display:none">Disconnect</button>
        </div>
        <div class="row">
          <input id="bet" type="number" value="25" placeholder="bet" />
        </div>
        <div id="resultBanner" class="result-banner" style="display:none"></div>
        <div class="row">
          <button id="startBtn" class="primary">Deal Hand</button>
          <button id="hitBtn">Hit</button>
          <button id="standBtn" class="warn">Stand</button>
        </div>
      </section>
    </section>
  </main>

  <script src="https://unpkg.com/@solana/web3.js@1.98.2/lib/index.iife.min.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const summaryEl = document.getElementById('summary');
    const dealerTotalEl = document.getElementById('dealerTotal');
    const playerTotalEl = document.getElementById('playerTotal');
    const dealerCardsEl = document.getElementById('dealerCards');
    const playerCardsEl = document.getElementById('playerCards');
    const walletStatusEl = document.getElementById('walletStatus');
    const resultBannerEl = document.getElementById('resultBanner');
    const startBtn = document.getElementById('startBtn');
    const hitBtn = document.getElementById('hitBtn');
    const standBtn = document.getElementById('standBtn');
    const walletConnectBtn = document.getElementById('walletConnect');
    const walletDisconnectBtn = document.getElementById('walletDisconnect');

    const q = (id) => document.getElementById(id);
    const shortKey = (k) => (k && k.length > 12 ? `${k.slice(0, 4)}...${k.slice(-4)}` : k || '-');
    let walletProvider = null;
    let walletAddress = '';
    let solanaConnection = null;
    let currentState = null;
    let inFlight = false;

    function rankLabel(rank) {
      if (rank === 1) return 'A';
      if (rank === 11) return 'J';
      if (rank === 12) return 'Q';
      if (rank === 13) return 'K';
      return String(rank || '?');
    }

    function suitFor(index, seed) {
      const suits = ['♠', '♥', '♦', '♣'];
      return suits[Math.abs((seed + index * 3) % 4)];
    }

    function outcomeLabel(code) {
      const map = {
        0: 'idle',
        1: 'active',
        2: 'player bust',
        3: 'dealer bust',
        4: 'player win',
        5: 'dealer win',
        6: 'push'
      };
      return map[code] || `status:${code}`;
    }

    function cardNode(rank, index, seed, hidden) {
      const card = document.createElement('article');
      card.className = `card ${hidden ? 'hidden' : ''}`;
      if (hidden) {
        card.innerHTML = `<div class="top">?</div><div class="mid">?</div><div class="bot">?</div>`;
        return card;
      }
      const suit = suitFor(index, seed || 0);
      const label = rankLabel(rank);
      const red = suit === '♥' || suit === '♦';
      if (red) card.classList.add('red');
      card.innerHTML = `<div class="top">${label}${suit}</div><div class="mid">${suit}</div><div class="bot">${label}${suit}</div>`;
      return card;
    }

    const call = async (path, payload = {}) => {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ ...payload, wallet: walletAddress || null }),
      });
      const body = await res.json();
      if (!res.ok) throw new Error(body.error || body.message || 'request failed');
      return body;
    };

    const ensureConnection = () => {
      if (!solanaConnection) {
        solanaConnection = new window.solanaWeb3.Connection('http://127.0.0.1:8899', 'confirmed');
      }
      return solanaConnection;
    };

    const walletReady = () => Boolean(walletAddress && walletProvider && window.solanaWeb3?.Transaction);
    const walletSupportsSend = () => Boolean(walletProvider?.signTransaction || walletProvider?.sendTransaction || walletProvider?.signAndSendTransaction);

    const requireWallet = () => {
      if (!walletReady()) throw new Error('Connect Phantom to sign actions.');
      if (!walletSupportsSend()) throw new Error('Wallet adapter does not support transaction signing/sending.');
    };

    const updateWalletUi = () => {
      const isConnected = Boolean(walletAddress);
      walletConnectBtn.style.display = isConnected ? 'none' : 'inline-block';
      walletDisconnectBtn.style.display = isConnected ? 'inline-block' : 'none';
      if (walletAddress) {
        walletStatusEl.textContent = `${shortKey(walletAddress)} (signed)`;
        walletStatusEl.style.color = 'var(--ink)';
      } else if (walletProvider) {
        walletStatusEl.textContent = 'disconnected';
      } else {
        walletStatusEl.textContent = 'Phantom not found';
        walletStatusEl.style.color = 'var(--danger)';
      }
      updateActionButtons();
    };

    const txFromBase64 = (txBase64) =>
      window.solanaWeb3.Transaction.from(Uint8Array.from(atob(txBase64), (c) => c.charCodeAt(0)));

    const sendAndConfirm = async (tx) => {
      requireWallet();
      const connection = ensureConnection();
      tx.feePayer = new window.solanaWeb3.PublicKey(walletAddress);
      tx.recentBlockhash = (await connection.getLatestBlockhash('confirmed')).blockhash;

      let signature = '';
      if (walletProvider.signTransaction) {
        const signedTx = await walletProvider.signTransaction(tx);
        signature = await connection.sendRawTransaction(signedTx.serialize(), { skipPreflight: false });
      } else if (walletProvider.sendTransaction) {
        signature = await walletProvider.sendTransaction(tx, connection);
      } else if (walletProvider.signAndSendTransaction) {
        const sent = await walletProvider.signAndSendTransaction(tx);
        signature = sent?.signature || '';
      }
      if (!signature) throw new Error('Wallet returned empty signature.');
      await connection.confirmTransaction(signature, 'confirmed');
      const confirmedSlot = await connection.getSlot('confirmed');
      return { signature, confirmedSlot };
    };

    const actionPayload = (action) => {
      if (action === 'init') {
        return {
          initialChips: 500,
          minBet: 10,
          maxBet: 100,
          dealerSoft17Hits: true,
        };
      }
      if (action === 'start') {
        return {
          bet: Number(q('bet').value || 25),
          seed: Number(Date.now() % 1000000),
        };
      }
      return {};
    };

    const sendWalletAction = async (action) => {
      requireWallet();
      const payload = actionPayload(action);
      const built = await call('/api/build-wallet-action', { action, ...payload });
      if (!built?.txBase64) throw new Error(`missing tx for ${action}`);
      const tx = txFromBase64(built.txBase64);
      const sent = await sendAndConfirm(tx);
      return call('/api/commit-wallet-action', { action, signature: sent.signature, confirmedSlot: sent.confirmedSlot, ...payload });
    };

    const gameInitialized = () => {
      const table = currentState?.table || {};
      const player = currentState?.player || {};
      return Number(table.minBet || 0) > 0 && Number(player.chips || 0) > 0;
    };
    const inRound = () => Boolean(currentState?.player?.inRound);

    const updateResultBanner = () => {
      const outcome = Number(currentState?.player?.outcome || 0);
      const showingRoundEnd = !inRound() && [2, 3, 4, 5, 6].includes(outcome);
      if (!showingRoundEnd) {
        resultBannerEl.style.display = 'none';
        resultBannerEl.className = 'result-banner';
        resultBannerEl.textContent = '';
        return;
      }
      let text = '';
      let cls = 'result-banner';
      if (outcome === 4 || outcome === 3) {
        text = 'You win this hand.';
        cls += ' result-win';
      } else if (outcome === 5 || outcome === 2) {
        text = 'Dealer wins this hand.';
        cls += ' result-lose';
      } else {
        text = 'Push. Bet returned.';
        cls += ' result-push';
      }
      resultBannerEl.className = cls;
      resultBannerEl.textContent = text;
      resultBannerEl.style.display = 'block';
    };

    const updateActionButtons = () => {
      const connected = Boolean(walletAddress);
      const initialized = gameInitialized();
      const activeRound = inRound();

      startBtn.disabled = inFlight || !connected || activeRound;
      hitBtn.disabled = inFlight || !connected || !initialized || !activeRound;
      standBtn.disabled = inFlight || !connected || !initialized || !activeRound;
      walletConnectBtn.disabled = inFlight;
      walletDisconnectBtn.disabled = inFlight;
      q('bet').disabled = inFlight || activeRound;
    };

    const dealHand = async () => {
      if (!gameInitialized()) {
        await sendWalletAction('init');
      }
      return sendWalletAction('start');
    };

    function paintCards(state) {
      dealerCardsEl.innerHTML = '';
      playerCardsEl.innerHTML = '';

      const player = state?.hands?.player || [];
      const dealer = state?.hands?.dealer || [];
      const revealDealer = Boolean(state?.hands?.dealerReveal);
      const seed = Number(state?.round?.deckSeed || 0);

      player.forEach((rank, i) => playerCardsEl.appendChild(cardNode(rank, i, seed + 11, false)));
      dealer.forEach((rank, i) => {
        const hidden = !revealDealer && i === 1;
        dealerCardsEl.appendChild(cardNode(rank, i, seed + 29, hidden));
      });

      if (player.length === 0) {
        playerCardsEl.innerHTML = '<span class="subtitle">No cards yet</span>';
      }
      if (dealer.length === 0) {
        dealerCardsEl.innerHTML = '<span class="subtitle">No cards yet</span>';
      }
    }

    function paint(body) {
      const state = body.state || {};
      currentState = state;
      const player = state.player || {};

      paintCards(state);

      const dealerShown = state?.hands?.dealerReveal ? (player.dealerTotal ?? 0) : '?';
      dealerTotalEl.textContent = `total: ${dealerShown}`;
      playerTotalEl.textContent = `total: ${player.handTotal ?? 0}`;

      summaryEl.textContent = `chips: ${player.chips ?? 0} | bet: ${player.activeBet ?? 0} | outcome: ${outcomeLabel(player.outcome ?? 0)}`;
      statusEl.textContent = body.message || 'Ready to play';
      updateResultBanner();
      updateActionButtons();
    }

    async function action(fn) {
      try {
        inFlight = true;
        updateActionButtons();
        statusEl.textContent = 'processing...';
        const body = await fn();
        paint(body);
      } catch (err) {
        statusEl.textContent = String(err.message || err);
      } finally {
        inFlight = false;
        updateActionButtons();
      }
    }

    q('startBtn').onclick = () => action(() => dealHand());
    q('hitBtn').onclick = () => action(() => sendWalletAction('hit'));
    q('standBtn').onclick = () => action(() => sendWalletAction('stand'));

    q('walletConnect').onclick = async () => {
      try {
        walletProvider = window?.phantom?.solana || window?.solana || null;
        if (!walletProvider) throw new Error('Phantom extension not found.');
        const res = await walletProvider.connect();
        walletAddress = res?.publicKey?.toString() || '';
        updateWalletUi();
        await action(() => call('/api/state'));
      } catch (err) {
        statusEl.textContent = String(err.message || err);
      }
    };

    q('walletDisconnect').onclick = async () => {
      try {
        if (walletProvider && walletAddress && walletProvider.disconnect) await walletProvider.disconnect();
      } catch {}
      walletAddress = '';
      updateWalletUi();
    };

    (() => {
      const p = window?.phantom?.solana || window?.solana || null;
      if (p && p.isPhantom) {
        walletProvider = p;
        walletProvider.on?.('connect', () => {
          walletAddress = walletProvider.publicKey?.toString() || '';
          updateWalletUi();
        });
        walletProvider.on?.('disconnect', () => {
          walletAddress = '';
          updateWalletUi();
        });
      }
      updateWalletUi();
    })();

    action(() => call('/api/state'));
  </script>
</body>
</html>
